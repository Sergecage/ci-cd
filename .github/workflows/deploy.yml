steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-node@v4
    with:
      node-version: 20
      cache: npm

  - run: npm ci

  - run: npm run build

  - name: Configure GitHub Pages
    uses: actions/configure-pages@v5

  - uses: actions/upload-pages-artifact@v3
    with:
      path: ./dist

  - id: deployment
    uses: actions/deploy-pages@v4