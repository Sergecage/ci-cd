name: Branch Name Check

on:
  push:
  pull_request:

jobs:
  check-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Check branch name
        run: |
          BRANCH=${GITHUB_HEAD_REF}

          echo "Branch: $BRANCH"

          if [[ ! "$BRANCH" =~ ^feature\/.+$ ]]; then
            echo "Branch name must start with feature/"
            exit 1
          fi